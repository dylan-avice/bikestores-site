<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - BikeStores</title>
  <link rel="icon" type="image/png" href="assets/images/BS_logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

  <div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow p-4" style="width: 100%; max-width: 420px;">
      <h1 class="h3 mb-4 text-center brand-wordmark login-brand-title">BikeStores Login</h1>

      <form id="loginForm">
        <div class="mb-3">
          <label for="employee_email" class="form-label">Email</label>
          <input type="email" class="form-control" id="employee_email" required>
        </div>

        <div class="mb-3">
          <label for="employee_password" class="form-label">Password</label>
          <input type="password" class="form-control" id="employee_password" required>
        </div>

        <div id="loginMessage" class="mb-3 text-danger"></div>

        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
    </div>
  </div>

  <script src="assets/js/auth.js"></script>
</body>
</html>
