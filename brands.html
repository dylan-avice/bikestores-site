<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Brands - BikeStores</title>
    <link rel="icon" type="image/png" href="assets/images/BS_logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="assets/images/BS_logo.png" alt="BikeStores" class="navbar-brand-logo">
                <span>BikeStores</span>
            </a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarMenu"
                    aria-controls="navbarMenu"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav me-auto" id="menu"></ul>
                <span class="text-white me-3" id="userInfo"></span>
                <button class="btn btn-outline-light" onclick="logout()">
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1>Brands</h1>
            <button class="btn btn-primary" id="addBrandBtn">Add Brand</button>
        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <label for="searchName" class="form-label">Search by Name</label>
                <input type="text" id="searchName" class="form-control" placeholder="Type a brand name...">
            </div>
        </div>

        <div id="messageBox" class="mb-3 text-danger"></div>

        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="brandsTableBody"></tbody>
        </table>

        <div class="d-flex justify-content-between align-items-center mt-3">
            <button class="btn btn-secondary" id="prevPageBtn">Previous</button>
            <span id="pageInfo"></span>
            <button class="btn btn-secondary" id="nextPageBtn">Next</button>
        </div>

    </div>

    <div class="modal fade" id="brandModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <form id="brandForm">

                    <div class="modal-header">
                        <h5 class="modal-title" id="brandModalTitle">Add Brand</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <input type="hidden" id="brandId">

                        <div class="mb-3">
                            <label class="form-label">Brand Name</label>
                            <input type="text" class="form-control" id="brandName" required>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-primary">Save</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    </div>

                </form>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/brands.js"></script>

</body>

</html>
