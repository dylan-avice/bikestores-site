<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile - BikeStores</title>
    <link rel="icon" type="image/png" href="assets/images/BS_logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
            <img src="assets/images/BS_logo.png" alt="BikeStores" class="navbar-brand-logo">
            <span>BikeStores</span>
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu"
                aria-controls="navbarMenu"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav me-auto" id="menu"></ul>
            <span class="text-white me-3" id="userInfo"></span>
            <button class="btn btn-outline-light" onclick="logout()">
                Logout
            </button>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="mb-4">My Profile</h1>

    <div id="messageBox" class="mb-3"></div>

    <form id="profileForm" class="card p-4 shadow-sm">
        <div class="mb-3">
            <label for="employeeName" class="form-label">Name</label>
            <input type="text" class="form-control" id="employeeName" required>
        </div>

        <div class="mb-3">
            <label for="employeeEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="employeeEmail" required>
        </div>

        <div class="mb-3">
            <label for="employeePassword" class="form-label">Password</label>
            <input type="text" class="form-control" id="employeePassword" required>
        </div>

        <div class="mb-3">
            <label for="employeeRole" class="form-label">Role</label>
            <input type="text" class="form-control bg-light text-muted" id="employeeRole" readonly>
        </div>

        <div class="mb-3">
            <label for="employeeStore" class="form-label">Store</label>
            <input type="text" class="form-control bg-light text-muted" id="employeeStore" readonly>
        </div>

        <button type="submit" class="btn btn-primary">Save my changes</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/profile.js"></script>

</body>
</html>
