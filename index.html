<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BikeStores</title>
    <link rel="icon" type="image/png" href="assets/images/BS_logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="assets/images/BS_logo.png" alt="BikeStores" class="navbar-brand-logo">
                <span>BikeStores</span>
            </a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarMenu"
                    aria-controls="navbarMenu"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav me-auto" id="menu"></ul>
                <span class="text-white me-3" id="userInfo"></span>
                <button class="btn btn-outline-light" onclick="logout()">
                    Logout
                </button>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h1>Welcome to the BikeStores back office !</h1>
        <img src="assets/images/BikeStores_logo.png" alt="BikeStores logo" class="img-fluid d-block mx-auto mt-4" style="max-width: 760px; width: 100%;">
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/layout.js"></script>
</body>
</html>
