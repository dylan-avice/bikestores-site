<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stocks - BikeStores</title>
    <link rel="icon" type="image/png" href="assets/images/BS_logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
            <img src="assets/images/BS_logo.png" alt="BikeStores" class="navbar-brand-logo">
            <span>BikeStores</span>
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu"
                aria-controls="navbarMenu"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav me-auto" id="menu"></ul>
            <span class="text-white me-3" id="userInfo"></span>
            <button class="btn btn-outline-light" onclick="logout()">
                Logout
            </button>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Stocks</h1>

        <div class="d-flex align-items-center gap-2">
            <div id="storeFilterContainer"></div>
            <button class="btn btn-primary" id="addStockBtn">Add Stock</button>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-4">
            <label for="searchProduct" class="form-label">Search by Product</label>
            <input type="text" id="searchProduct" class="form-control" placeholder="Type a product name...">
        </div>
    </div>

    <div id="messageBox" class="mb-3 text-danger"></div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Store</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="stocksTableBody"></tbody>
    </table>

    <div class="d-flex justify-content-between align-items-center mt-3">
        <button class="btn btn-secondary" id="prevPageBtn">Previous</button>
        <span id="pageInfo"></span>
        <button class="btn btn-secondary" id="nextPageBtn">Next</button>
    </div>
</div>

<div class="modal fade" id="stockModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="stockForm">
                <div class="modal-header">
                    <h5 class="modal-title" id="stockModalTitle">Add Stock</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="stockId">

                    <div class="mb-3">
                        <label for="stockStore" class="form-label">Store</label>
                        <select class="form-select" id="stockStore" required></select>
                    </div>

                    <div class="mb-3">
                        <label for="stockProduct" class="form-label">Product</label>
                        <select class="form-select" id="stockProduct" required></select>
                    </div>

                    <div class="mb-3">
                        <label for="stockQuantity" class="form-label">Quantity</label>
                        <input type="number" class="form-control" id="stockQuantity" min="0" required>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/stocks.js"></script>

</body>
</html>
