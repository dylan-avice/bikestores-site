<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products - BikeStores</title>
  <link rel="icon" type="image/png" href="assets/images/BS_logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
          <img src="assets/images/BS_logo.png" alt="BikeStores" class="navbar-brand-logo">
          <span>BikeStores</span>
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu"
                aria-controls="navbarMenu"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav me-auto" id="menu"></ul>
            <span class="text-white me-3" id="userInfo"></span>
            <button class="btn btn-outline-light" onclick="logout()">
                Logout
            </button>
        </div>
    </div>
</nav>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Products</h1>
    <button class="btn btn-primary" id="addProductBtn">Add Product</button>
  </div>

  <div class="row mb-3">
    <div class="col-md-4">
      <label for="filterName" class="form-label">Search by Name</label>
      <input type="text" id="filterName" class="form-control" placeholder="Type a product name...">
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-md-2">
      <label for="filterBrand" class="form-label">Brand</label>
      <select id="filterBrand" class="form-select">
        <option value="">All</option>
      </select>
    </div>

    <div class="col-md-2">
      <label for="filterCategory" class="form-label">Category</label>
      <select id="filterCategory" class="form-select">
        <option value="">All</option>
      </select>
    </div>

    <div class="col-md-2">
      <label for="filterYear" class="form-label">Year</label>
      <input type="number" id="filterYear" class="form-control">
    </div>

    <div class="col-md-2">
      <label for="filterPriceMin" class="form-label">Min Price</label>
      <input type="number" step="0.01" id="filterPriceMin" class="form-control">
    </div>

    <div class="col-md-2">
      <label for="filterPriceMax" class="form-label">Max Price</label>
      <input type="number" step="0.01" id="filterPriceMax" class="form-control">
    </div>

    <div class="col-md-2 d-flex align-items-end">
      <button class="btn btn-success me-2" id="applyFiltersBtn">Apply</button>
      <button class="btn btn-secondary" id="resetFiltersBtn">Reset</button>
    </div>
  </div>

  <div id="messageBox" class="mb-3 text-danger"></div>

  <div class="table-responsive">
    <table class="table table-bordered table-hover">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Brand</th>
          <th>Category</th>
          <th>Year</th>
          <th>Price</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="productsTableBody"></tbody>
    </table>
  </div>

  <div class="d-flex justify-content-between align-items-center mt-3">
    <button class="btn btn-secondary" id="prevPageBtn">Previous</button>
    <span id="pageInfo"></span>
    <button class="btn btn-secondary" id="nextPageBtn">Next</button>
  </div>
  
</div>

<div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="productForm">
        <div class="modal-header">
          <h5 class="modal-title" id="productModalTitle">Add Product</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <input type="hidden" id="productId">

          <div class="mb-3">
            <label for="productName" class="form-label">Product Name</label>
            <input type="text" class="form-control" id="productName" required>
          </div>

          <div class="mb-3">
            <label for="productBrand" class="form-label">Brand</label>
            <select class="form-select" id="productBrand" required></select>
          </div>

          <div class="mb-3">
            <label for="productCategory" class="form-label">Category</label>
            <select class="form-select" id="productCategory" required></select>
          </div>

          <div class="mb-3">
            <label for="productYear" class="form-label">Model Year</label>
            <input type="number" class="form-control" id="productYear" required>
          </div>

          <div class="mb-3">
            <label for="productPrice" class="form-label">List Price</label>
            <input type="number" step="0.01" class="form-control" id="productPrice" required>
          </div>
        </div>

        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/products.js"></script>
</body>
</html>
