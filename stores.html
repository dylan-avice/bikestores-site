<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stores - BikeStores</title>
    <link rel="icon" type="image/png" href="assets/images/BS_logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
            <img src="assets/images/BS_logo.png" alt="BikeStores" class="navbar-brand-logo">
            <span>BikeStores</span>
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu"
                aria-controls="navbarMenu"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav me-auto" id="menu"></ul>
            <span class="text-white me-3" id="userInfo"></span>
            <button class="btn btn-outline-light" onclick="logout()">
                Logout
            </button>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Stores</h1>

        <div class="d-flex align-items-center gap-2">
            <div id="storeScopeInfo" class="d-none"></div>
            <button class="btn btn-primary" id="addStoreBtn">Add Store</button>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-4">
            <label for="searchName" class="form-label">Search by Name</label>
            <input type="text" id="searchName" class="form-control" placeholder="Type a store name...">
        </div>
    </div>

    <div id="messageBox" class="mb-3 text-danger"></div>

    <div class="table-responsive">
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Street</th>
                    <th>City</th>
                    <th>State</th>
                    <th>Zip Code</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="storesTableBody"></tbody>
        </table>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3">
        <button class="btn btn-secondary" id="prevPageBtn">Previous</button>
        <span id="pageInfo"></span>
        <button class="btn btn-secondary" id="nextPageBtn">Next</button>
    </div>

</div>

<div class="modal fade" id="storeModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <form id="storeForm">

                <div class="modal-header">
                    <h5 class="modal-title" id="storeModalTitle">Add Store</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="storeId">

                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" id="storeName" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" id="storePhone">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="storeEmail">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Street</label>
                        <input type="text" class="form-control" id="storeStreet">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control" id="storeCity">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">State</label>
                        <input type="text" class="form-control" id="storeState">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Zip Code</label>
                        <input type="text" class="form-control" id="storeZip">
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary">Save</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                </div>

            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/stores.js"></script>

</body>
</html>
