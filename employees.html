<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employees - BikeStores</title>
    <link rel="icon" type="image/png" href="assets/images/BS_logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
            <img src="assets/images/BS_logo.png" alt="BikeStores" class="navbar-brand-logo">
            <span>BikeStores</span>
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu"
                aria-controls="navbarMenu"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav me-auto" id="menu"></ul>
            <span class="text-white me-3" id="userInfo"></span>
            <button class="btn btn-outline-light" onclick="logout()">
                Logout
            </button>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Employees</h1>

        <div class="d-flex align-items-center gap-2">
            <div id="storeFilterContainer"></div>
            <button class="btn btn-primary" id="addEmployeeBtn">Add Employee</button>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-4">
            <label for="searchName" class="form-label">Search by Name</label>
            <input type="text" id="searchName" class="form-control" placeholder="Type an employee name...">
        </div>
    </div>

    <div id="messageBox" class="mb-3 text-danger"></div>

    <div class="table-responsive">
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Store</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="employeesTableBody"></tbody>
        </table>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3">
        <button class="btn btn-secondary" id="prevPageBtn">Previous</button>
        <span id="pageInfo"></span>
        <button class="btn btn-secondary" id="nextPageBtn">Next</button>
    </div>
</div>

<div class="modal fade" id="employeeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="employeeForm">
                <div class="modal-header">
                    <h5 class="modal-title" id="employeeModalTitle">Add Employee</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="employeeId">

                    <div class="mb-3">
                        <label for="employeeStore" class="form-label">Store</label>
                        <select class="form-select" id="employeeStore" required></select>
                    </div>

                    <div class="mb-3">
                        <label for="employeeName" class="form-label">Name</label>
                        <input type="text" class="form-control" id="employeeName" required>
                    </div>

                    <div class="mb-3">
                        <label for="employeeEmail" class="form-label">Email</label>
                        <input type="email" class="form-control" id="employeeEmail" required>
                    </div>

                    <div class="mb-3">
                        <label for="employeePassword" class="form-label">Password</label>
                        <input type="text" class="form-control" id="employeePassword" required>
                    </div>

                    <div class="mb-3">
                        <label for="employeeRole" class="form-label">Role</label>
                        <select class="form-select" id="employeeRole" required>
                            <option value="employee">employee</option>
                            <option value="chief">chief</option>
                            <option value="it">it</option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/employees.js"></script>

</body>
</html>
